<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>古本持ち去り事件　報告メール</title>

<style>
  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    min-height: 100%;
  }

  body {
    background: #d8dde3;
    font-family: Arial, "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
    color: #222222;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 26px 14px 64px;
  }

  .app {
    width: 100%;
    max-width: 760px;
    position: relative;
    z-index: 1;
  }

  .mail {
    overflow: hidden;
    background: #f7f7f7;
    border-radius: 14px;
    box-shadow: 0 18px 45px rgba(0, 0, 0, 0.14);
    transition: transform 0.5s ease, opacity 0.5s ease;
  }

  .mail.sending {
    transform: translateY(-18px);
    opacity: 0.5;
  }

  .header {
    padding: 18px 22px;
    background: #2f3848;
    color: #ffffff;
    font-size: 17px;
    font-weight: 700;
    line-height: 1.35;
  }

  .row {
    display: flex;
    align-items: center;
    min-height: 50px;
    padding: 0 18px;
    border-bottom: 1px solid #cfcfcf;
    background: #f7f7f7;
  }

  .label {
    width: 84px;
    flex-shrink: 0;
    color: #666666;
    font-size: 16px;
  }

  .value {
    color: #111111;
    font-size: 16px;
    overflow-wrap: anywhere;
  }

  .value a,
  .reply-title a {
    color: #000000;
    text-decoration: underline;
  }

  textarea {
    display: block;
    width: 100%;
    height: 305px;
    padding: 24px 22px;
    border: none;
    outline: none;
    resize: none;
    background: #f7f7f7;
    color: #333333;
    font-family: inherit;
    font-size: 17px;
    line-height: 1.8;
  }

  textarea::placeholder {
    color: #6f7580;
  }

  .footer-area {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    min-height: 76px;
    padding: 14px 18px;
    background: #e6e7ea;
  }

  button {
    border: none;
    border-radius: 6px;
    background: #4d4f9f;
    color: #ffffff;
    cursor: pointer;
    font-family: inherit;
    font-size: 15px;
  }

  button:disabled {
    background: #b9b9be;
    color: #efefef;
    cursor: not-allowed;
  }

  #sendButton {
    min-width: 86px;
    padding: 12px 24px;
    font-weight: 700;
  }

  .status {
    display: none;
    margin-top: 14px;
    color: #4f5560;
    font-size: 14px;
    text-align: center;
  }

  .notification {
    display: none;
    width: 100%;
    margin-top: 16px;
    padding: 15px 18px;
    border-radius: 10px;
    background: #ffffff;
    color: #333333;
    text-align: left;
    font-weight: 700;
    box-shadow: 0 10px 24px rgba(0, 0, 0, 0.10);
    cursor: pointer;
    pointer-events: auto;
    touch-action: manipulation;
    position: relative;
    z-index: 2;
    animation: fadeIn 0.5s;
  }

  .notification:hover {
    background: #f8f8fb;
  }

  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 999;
    background: rgba(0, 0, 0, 0.42);
  }

  .reply {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    z-index: 1000;
    width: min(92vw, 620px);
    max-height: 84vh;
    overflow-y: auto;
    padding: 24px;
    border-radius: 14px;
    background: #ffffff;
    box-shadow: 0 22px 55px rgba(0, 0, 0, 0.28);
    transform: translate(-50%, -50%);
  }

  .reply-title {
    border-bottom: 1px solid #d7d7d7;
    padding: 0 34px 12px 0;
    font-size: 15px;
    font-weight: 700;
    line-height: 1.7;
  }

  .reply-suffix {
    margin-top: 8px;
    color: #4d4f9f;
  }

  #replyText {
    padding-top: 18px;
    font-size: 15px;
    line-height: 1.85;
  }

  .reply-paragraph {
    margin: 0 0 16px;
    white-space: pre-line;
    overflow-wrap: anywhere;
  }

  .closeBtn {
    position: absolute;
    top: 12px;
    right: 16px;
    width: auto;
    padding: 0;
    border: none;
    background: none;
    color: #666666;
    font-size: 24px;
  }

  .closeBtn:hover {
    color: #000000;
  }

  .attachment {
    margin: 0 0 18px;
    padding: 12px;
    border: 1px solid #d6d8df;
    border-radius: 10px;
    background: #f7f8fb;
  }

  .attachment-label {
    margin-bottom: 10px;
    color: #4f5560;
    font-size: 13px;
    font-weight: 700;
  }

  .attachment-image {
    display: block;
    width: 100%;
    max-height: 360px;
    object-fit: contain;
    border-radius: 6px;
    background: #e3e5ea;
  }

  .attachment-missing {
    display: none;
    padding: 28px 14px;
    border-radius: 6px;
    background: #e3e5ea;
    color: #5d6470;
    font-size: 14px;
    text-align: center;
  }

  .xPostWrap {
    margin-top: 18px;
    text-align: center;
  }

  .xPostBtn {
    padding: 11px 20px;
    border-radius: 8px;
    background: #000000;
    color: #ffffff;
    font-weight: 700;
    animation: xButtonIn 0.6s ease;
  }

  .optionArea {
    margin-top: 18px;
  }

  .optionBtn {
    display: block;
    width: 100%;
    margin-top: 8px;
    padding: 11px 16px;
    background: #4d4f9f;
    color: #ffffff;
    text-align: left;
    font-weight: 700;
  }

  .optionBtn:hover,
  .xPostBtn:hover {
    opacity: 0.85;
  }

  footer {
    position: fixed;
    right: 14px;
    bottom: 12px;
    left: 14px;
    z-index: 1;
    color: #555555;
    font-size: 12px;
    line-height: 1.7;
    text-align: center;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes xButtonIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 520px) {
    body {
      padding-top: 16px;
      padding-bottom: 70px;
    }

    .header {
      padding: 16px 18px;
      font-size: 16px;
    }

    .row {
      padding: 0 14px;
    }

    .label {
      width: 74px;
      font-size: 15px;
    }

    .value {
      font-size: 15px;
    }

    textarea {
      height: 260px;
      padding: 18px 16px;
      font-size: 16px;
    }

    .reply {
      padding: 20px;
    }
  }
</style>
</head>

<body>
<div class="app">
  <div class="mail" id="mailBox">
    <div class="header">古本持ち去り事件　報告メール</div>

    <div class="row">
      <div class="label">To</div>
      <div class="value">
        <a href="mailto:N.F@koreha.fiction.da">N.F@koreha.fiction.da</a>
      </div>
    </div>

    <div class="row">
      <div class="label">Subject</div>
      <div class="value">古本持ち去り事件　報告メール</div>
    </div>

    <textarea id="answer" placeholder="ここに報告内容を入力してください"></textarea>

    <div class="footer-area">
      <button id="sendButton" type="button" disabled>送信</button>
    </div>
  </div>

  <div id="status" class="status">送信中...</div>

  <button id="notification" class="notification" type="button">
    📩 新着メール 1件<br>
    <strong>From: N.F@koreha.fiction.da</strong>
  </button>
</div>

<div id="overlay" class="overlay"></div>

<div id="reply" class="reply" role="dialog" aria-modal="true">
  <button id="closeReplyButton" class="closeBtn" type="button" aria-label="閉じる">×</button>

  <div class="reply-title">
    From:
    <a href="mailto:N.F@koreha.fiction.da">N.F@koreha.fiction.da</a><br>
    Subject: RE: 古本持ち去り事件　報告メール
    <div id="replySuffix" class="reply-suffix"></div>
  </div>

  <div id="replyText"></div>
</div>

<footer>
  本作品はフィクションです。実際の地名・団体・人物とは一切関係ございません。<br>
  X: @r4lu3m8l
</footer>

<script>
  const answerBox = document.getElementById("answer");
  const sendButton = document.getElementById("sendButton");
  const notification = document.getElementById("notification");
  const status = document.getElementById("status");
  const mailBox = document.getElementById("mailBox");
  const overlay = document.getElementById("overlay");
  const reply = document.getElementById("reply");
  const replyText = document.getElementById("replyText");
  const replySuffix = document.getElementById("replySuffix");
  const closeReplyButton = document.getElementById("closeReplyButton");

  const newMailQueue = [];
  let isSending = false;
  let isReplyOpen = false;
  let typingToken = 0;

  // 人物名の報告後だけ、次のメール内容を別判定にするための記録です。
  let pendingFollowUp = null;

  // 画像ファイルは index.html と同じフォルダへ置いてください。
  // 拡張子が .jpg 以外の場合は、src の末尾だけ実際のファイル名に変更してください。
  const attachments = {
    rack: {
      filename: "File005_rack.jpg",
      src: "./File005_rack.jpg",
      alt: "N.Fから送られた本棚の写真"
    },
    book: {
      filename: "File005_book.jpg",
      src: "./File005_book.jpg",
      alt: "N.Fから送られた赤い春の一家の5ページ目の写真"
    }
  };

  const optionLabels = {
    1: "①メモについて",
    2: "②Ｎ．Ｆは何ができるのか？",
    3: "③メモの謎は解けた",
    4: "④もう少し一緒に考えてほしい",
    5: "⑤本の謎は解けた",
    6: "⑥まだ相談に乗ってほしい"
  };

  // ヒントは1通につきボタン1つだけ表示し、順番に次のメールへ進みます。
  const optionReplies = {
    1: {
      segments: [{ type: "text", text: "この形…どこかにないだろうか。\n私にできることはあるか？" }],
      suffix: "＞メモについて",
      options: [2]
    },
    2: {
      segments: [{ type: "text", text: "行動を指示してくれれば、大抵のことはできるだろう。\nこれの写真を送って。とかな。" }],
      suffix: "＞Ｎ．Ｆは何ができるのか？",
      options: [3]
    },
    3: {
      segments: [{ type: "text", text: "最初から最後。これが何を表すのか、よく内容を読めばわかるだろうか。" }],
      suffix: "＞メモの謎は解けた",
      options: [4]
    },
    4: {
      segments: [{ type: "text", text: "最初から最後…。「あ」から「ん」のような感じだろうか。\nしかし英単語が目立つな。" }],
      suffix: "＞もう少し一緒に考えてほしい",
      options: [5]
    },
    5: {
      segments: [{ type: "text", text: "タイトルは最初の本のことだろうか…？\n一度確認してみてほしい。" }],
      suffix: "＞本の謎は解けた",
      options: [6]
    },
    6: {
      segments: [{ type: "text", text: "「かくしごと」とはなんだろうか。\n二つの意味を持っていたりするのだろうか…？" }],
      suffix: "＞まだ相談に乗ってほしい"
    }
  };

  // File005の元ポストURLに差し替えてください。
  const originalPostUrl = "https://x.com/r4lu3m8l/status/2072640175159578704?s=20";

  function containsAny(text, words) {
    return words.some(function(word) {
      return text.includes(word);
    });
  }

  function updateSendButton() {
    sendButton.disabled = isSending || answerBox.value.trim() === "";
    if (!isSending) {
      sendButton.textContent = "送信";
    }
  }

  function showNotification() {
    if (isReplyOpen || newMailQueue.length === 0) {
      notification.style.display = "none";
      return;
    }

    notification.innerHTML =
      "📩 新着メール " +
      newMailQueue.length +
      "件<br><strong>From: N.F@koreha.fiction.da</strong>";

    notification.style.display = "block";
    notification.style.pointerEvents = "auto";
  }

  function queueNewMail(replyData) {
    newMailQueue.push(replyData);
    showNotification();
  }

  function successReply() {
    return {
      segments: [
        {
          type: "text",
          text:
            "【古本持ち去り事件の報告を受領した】\n" +
            "そうか…「かくしごと」だから「小説家」か。\n" +
            "君の謎解き力にいつも助けられている。\n" +
            "ありがとう。次も頼むよ。\n" +
            "しかし…君と謎を解いていると事件によく遭遇するな…"
        }
      ],
      showXPost: "book"
    };
  }

  function getReplyData(input) {
    const normalizedInput = input.normalize("NFKC").replace(/[\s　]/g, "").toLowerCase();
    const hasRack = input.includes("本棚");
    const hasRedBookPage =
      containsAny(normalizedInput, [
        "赤い本5p",
        "赤い本の5p目",
        "赤い本の5ページ目",
        "赤の本の5p",
        "赤の本の5p目",
        "赤の本の5ページ目",
        "赤の本5p",
        "赤の本5p目",
        "赤の本5ページ目"
      ]) ||
      (normalizedInput.includes("赤い春の一家") &&
        containsAny(normalizedInput, ["5p", "5ページ"]));
    const hasTitleBelow = input.includes("タイトル下よめ");
    const hasKakushigoto = input.includes("かくしごと");
    const hasKakuShigoto = input.includes("書く仕事");
    const hasAuthor = containsAny(input, ["小説家", "青井 直次郎"]);
    const hasPediatrician = containsAny(input, ["小児科医", "小森 紅"]);
    const hasActor = containsAny(input, ["俳優", "五黄 大河"]);
    const hasHint = containsAny(input, ["わからない", "ヒント"]);
    const hasMilk = input.includes("ミルク");
    const hasHaruno = input.includes("春野鏡子");
    const hasNFAbout = input.includes("N.Fについて") || input.includes("Ｎ．Ｆについて") || input.includes("NFについて");

    // 人物名を送ったあとの「次のメール」だけに適用される判定です。
    if (pendingFollowUp === "author") {
      if (hasKakushigoto || hasKakuShigoto) {
        pendingFollowUp = null;
        return successReply();
      }

      return {
        segments: [
          {
            type: "text",
            text: "その理由ではまだ確信が持てないな…。\nなぜ青井 直次郎が持ち出した本人だと思ったのか、もう一度メールで教えてほしい。"
          }
        ]
      };
    }

    if (pendingFollowUp === "pediatrician" || pendingFollowUp === "actor") {
      pendingFollowUp = null;
      return {
        segments: [
          { type: "text", text: "なるほど…あまりピンとこないな…\n申し訳ないがもう一度情報を見返してくれないか。" }
        ]
      };
    }

    if (hasRack) {
      return {
        segments: [
          { type: "text", text: "わかった。写真を添付しよう。" },
          { type: "attachment", attachment: attachments.rack }
        ]
      };
    }

    if (hasRedBookPage) {
      return {
        segments: [
          { type: "text", text: "なるほど、「赤い春の一家」の5ページ目か\n今写真で送ろう。" },
          { type: "attachment", attachment: attachments.book }
        ]
      };
    }

    if (hasTitleBelow) {
      return {
        segments: [
          { type: "text", text: "タイトル…、最初の本のことだろうか…？" }
        ]
      };
    }

    if (hasAuthor) {
      pendingFollowUp = "author";
      return {
        segments: [
          {
            type: "text",
            text: "なるほど…もう一度君の推理を聞かせてくれないか？\n\nなぜ青井 直次郎が持ち出した本人だと思ったのか。\n\nメールで教えてほしい。"
          }
        ]
      };
    }

    if (hasPediatrician) {
      pendingFollowUp = "pediatrician";
      return {
        segments: [
          {
            type: "text",
            text: "なるほど…もう一度君の推理を聞かせてくれないか？\n\nなぜ小森 紅が持ち出した本人だと思ったのか。\n\nメールで教えてほしい。"
          }
        ]
      };
    }

    if (hasActor) {
      pendingFollowUp = "actor";
      return {
        segments: [
          {
            type: "text",
            text: "なるほど…もう一度君の推理を聞かせてくれないか？\n\nなぜ五黄 大河が持ち出した本人だと思ったのか。\n\nメールで教えてほしい。"
          }
        ]
      };
    }

    if (hasKakushigoto) {
      return {
        segments: [
          { type: "text", text: "かくしごと…隠し事か…？\nこれでは誰だかがわからないな…\n君の見解を教えてほしい。" }
        ]
      };
    }

    if (hasHint) {
      return {
        segments: [
          { type: "text", text: "一緒に思考を整理しよう。まずは君の推理を聞かせてくれ。" }
        ],
        options: [1]
      };
    }

    if (hasMilk) {
      return {
        segments: [
          { type: "text", text: "ミルクちゃんは今私と一緒にいる。\nご主人に返しに行かなくてはな。" }
        ]
      };
    }

    if (hasHaruno) {
      return {
        segments: [
          { type: "text", text: "なんだか彼女の事件を彷彿とさせる内容だな…" }
        ]
      };
    }

    if (hasNFAbout) {
      return {
        segments: [
          { type: "text", text: "本はよく読むほうだが、いかんせん内容を覚えられなくてね…\n歳だろうか…" }
        ],
        showXPost: "nf"
      };
    }

    return {
      segments: [
        { type: "text", text: "なるほど…情報が足りない。もう一度確認してほしい。" }
      ]
    };
  }

  function sendMail() {
    const input = answerBox.value.trim();
    if (input === "" || isSending) return;

    const replyData = getReplyData(input);
    isSending = true;
    sendButton.disabled = true;
    sendButton.textContent = "送信中...";

    answerBox.value = "";
    notification.style.display = "none";
    status.style.display = "block";
    status.textContent = "送信中...";
    mailBox.classList.add("sending");

    setTimeout(function() {
      sendButton.textContent = "✓ 送信済み";
      status.textContent = "送信済み";
      mailBox.classList.remove("sending");
    }, 1200);

    setTimeout(function() {
      status.style.display = "none";
      isSending = false;
      updateSendButton();
      queueNewMail(replyData);
    }, 2800);
  }

  function openReply() {
    if (isReplyOpen || newMailQueue.length === 0) return;

    const replyData = newMailQueue.shift();
    isReplyOpen = true;
    notification.style.display = "none";
    overlay.style.display = "block";
    reply.style.display = "block";
    renderReply(replyData);
  }

  function renderReply(replyData) {
    typingToken += 1;
    const currentToken = typingToken;

    replyText.innerHTML = "";
    replySuffix.textContent = "";

    if (replyData.suffix) {
      replySuffix.textContent = replyData.suffix;
    }

    renderSegments(replyData.segments, currentToken, function() {
      if (currentToken !== typingToken || !isReplyOpen) return;
      if (replyData.options) appendOptions(replyData.options);
      if (replyData.showXPost) appendXPostButton(replyData.showXPost);
    });
  }

  function renderSegments(segments, token, finished) {
    let segmentIndex = 0;

    function renderNextSegment() {
      if (token !== typingToken || !isReplyOpen) return;
      if (segmentIndex >= segments.length) {
        finished();
        return;
      }

      const segment = segments[segmentIndex];

      if (segment.type === "attachment") {
        appendAttachment(segment.attachment);
        segmentIndex += 1;
        setTimeout(renderNextSegment, 80);
        return;
      }

      const paragraph = document.createElement("div");
      paragraph.className = "reply-paragraph";
      replyText.appendChild(paragraph);

      let characterIndex = 0;
      function typeNextCharacter() {
        if (token !== typingToken || !isReplyOpen) return;

        if (characterIndex < segment.text.length) {
          paragraph.textContent += segment.text.charAt(characterIndex);
          characterIndex += 1;
          setTimeout(typeNextCharacter, 25);
          return;
        }

        segmentIndex += 1;
        setTimeout(renderNextSegment, 80);
      }

      typeNextCharacter();
    }

    renderNextSegment();
  }

  function appendAttachment(attachmentData) {
    const wrap = document.createElement("div");
    wrap.className = "attachment";

    const label = document.createElement("div");
    label.className = "attachment-label";
    label.textContent = "📎 添付ファイル： " + attachmentData.filename;

    const image = document.createElement("img");
    image.className = "attachment-image";
    image.src = attachmentData.src + "?v=20260703";
    image.alt = attachmentData.alt;

    const missing = document.createElement("div");
    missing.className = "attachment-missing";
    missing.textContent = "画像「" + attachmentData.filename + "」が読み込めません。index.html と同じ場所に置いてください。";

    image.addEventListener("error", function() {
      image.style.display = "none";
      missing.style.display = "block";
    });

    wrap.appendChild(label);
    wrap.appendChild(image);
    wrap.appendChild(missing);
    replyText.appendChild(wrap);
  }

  function appendOptions(optionNumbers) {
    const optionArea = document.createElement("div");
    optionArea.className = "optionArea";

    optionNumbers.forEach(function(optionNumber) {
      const optionButton = document.createElement("button");
      optionButton.type = "button";
      optionButton.className = "optionBtn";
      optionButton.textContent = optionLabels[optionNumber];
      optionButton.addEventListener("click", function() {
        optionClick(optionNumber);
      });
      optionArea.appendChild(optionButton);
    });

    replyText.appendChild(optionArea);
  }

  function optionClick(optionNumber) {
    const nextReply = optionReplies[optionNumber];
    if (!nextReply) return;

    closeReplyForNextMail();
    queueNewMail(nextReply);
  }

  function appendXPostButton(postType) {
    const wrap = document.createElement("div");
    wrap.className = "xPostWrap";

    const xPostButton = document.createElement("button");
    xPostButton.type = "button";
    xPostButton.className = "xPostBtn";
    xPostButton.textContent = "Xで報告する";
    xPostButton.addEventListener("click", function() {
      postToX(postType);
    });

    wrap.appendChild(xPostButton);
    replyText.appendChild(wrap);
  }

  function postToX(postType) {
    let postText = "";

    if (postType === "nf") {
      postText =
        "【おりたたみ探偵file004】\n" +
        "N.Fについて少し知ることができた！\n" +
        "※N.Fについてで聞けるストーリーはネタバレOK◎";
    } else {
      postText =
        "【File005：おりたたみ探偵事務所　古本持ち去り事件】\n" +
        "古本を持ち出した人物を突き止め、\n" +
        "N.Fに報告した\n" +
        "#おりたたみ探偵事務所 #謎解き";
    }

    if (originalPostUrl === "元ポストのURLをここに貼る") {
      alert("コード内の originalPostUrl に、File005の元ポストURLを貼ってください。");
      return;
    }

    const postUrl =
      "https://x.com/intent/tweet?text=" +
      encodeURIComponent(postText) +
      "&url=" +
      encodeURIComponent(originalPostUrl);

    window.open(postUrl, "_blank", "noopener,noreferrer");
  }

  function hideReplyWindow() {
    typingToken += 1;
    isReplyOpen = false;
    overlay.style.display = "none";
    reply.style.display = "none";
    replyText.innerHTML = "";
    replySuffix.textContent = "";
  }

  function resetToInitialScreen() {
    status.style.display = "none";
    notification.style.display = "none";
    mailBox.classList.remove("sending");
    isSending = false;
    sendButton.textContent = "送信";
    answerBox.value = "";
    updateSendButton();
  }

  function closeReply() {
    hideReplyWindow();
    newMailQueue.length = 0;
    resetToInitialScreen();
    setTimeout(function() { answerBox.focus(); }, 0);
  }

  function closeReplyForNextMail() {
    hideReplyWindow();
    newMailQueue.length = 0;
    resetToInitialScreen();
    setTimeout(function() { answerBox.focus(); }, 0);
  }

  answerBox.addEventListener("input", updateSendButton);
  sendButton.addEventListener("click", sendMail);
  notification.addEventListener("click", openReply);
  closeReplyButton.addEventListener("click", closeReply);
  overlay.addEventListener("click", closeReply);
  updateSendButton();
</script>
</body>
</html>
